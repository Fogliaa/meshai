name: MeshAI
options:
  bundleIdPrefix: com.tuonome
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"   # 1 = iPhone only

targets:
  MeshAI:
    type: application
    platform: iOS
    sources:
      - path: MeshAI
        excludes:
          - "**/.github"
    info:
      path: MeshAI/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tuonome.meshai
        INFOPLIST_FILE: MeshAI/Info.plist
        CODE_SIGN_STYLE: Automatic
    dependencies: []
